; Project Stack-chan — M5Stack CoreS3 + Stack-chan servo base
; Spec: docs/superpowers/specs/2026-06-02-stackchan-design.md

[platformio]
default_envs = cores3

[env:cores3]
platform = espressif32@6.13.0
board = m5stack-cores3
framework = arduino

; CoreS3 has 8 MB Quad-SPI PSRAM (NOT Octal). qio_qspi is the working
; setting that survives the 3.20017 framework toolchain bump; qio_opi
; leaves ESP.getPsramSize() == 0 and breaks cloud-TTS MP3 allocation.
board_build.arduino.memory_type = qio_qspi

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17

build_unflags =
    -std=gnu++11

board_build.filesystem = littlefs
board_build.partitions = default_16MB.csv

monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder
    time

; Pin the CoreS3's USB-CDC port. VID:PID 303A:1001 is Espressif's USB-CDC
; composite. usbipd-win reports the device as COM16 on this host; if
; Device Manager shows a different COM number after re-plug, update both
; lines below.
; Switching to WSL flashing? Set upload_port/monitor_port = /dev/ttyACM0
; once `usbipd attach --wsl --busid 2-1` actually lands.
upload_port = COM16
monitor_port = COM16
upload_speed = 921600

lib_deps =
    m5stack/M5CoreS3@^1.0.1
    bblanchon/ArduinoJson@^7.2.0
    earlephilhower/ESP8266Audio@^1.9.7
    esp32async/ESPAsyncWebServer@^3.6.0
    esp32async/AsyncTCP@^3.2.0
    meganetaaan/M5Stack-Avatar@^0.10.0
    arduino-libraries/Servo@^1.2.2
    adafruit/Adafruit PWM Servo Driver Library@^3.0.2
    ; BusIO is transitively required by the PWM lib for SPI.h, but the
    ; ESP32 framework does not auto-resolve it — pin explicitly.
    adafruit/Adafruit BusIO@^1.16.1

; Native unit-test environment (host-side parser/mapper tests). Hardware
; tasks verify on the device; pure-logic modules are TDD'd here.
[env:native]
platform = native
build_flags = -std=gnu++17 -DUNIT_TEST
test_framework = unity
; test_build_src = yes causes PlatformIO to compile src/ alongside the test.
; build_src_filter restricts which src/ files are compiled — only pure-logic
; modules with no Arduino/M5 dependencies. Exclude main.cpp explicitly and
; include each testable module. Add new host-testable modules here.
test_build_src = yes
build_src_filter = -<*> +<persona/ResponseParser.cpp> +<face/ExpressionMap.cpp>
